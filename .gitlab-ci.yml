stages:
- test

image: debian:bullseye
before_script:
  - uname -a

pngcheck:
  stage: test
  script:
  - ./.tools/pngcheck.sh
  #allow_failure: true

imagemagiccheck:
  stage: test
  script:
  - ./.tools/imagemagiccheck.sh
  allow_failure: true

manaplus:
  stage: test
  image: debian:unstable
  script:
  - ./.tools/manaplus.sh manaplus master manaverse.log
  artifacts:
    paths:
    - shared
    when: always
    expire_in: 3 week

old_manaplus:
  stage: test
  image: debian:buster
  script:
  - ./.tools/manaplus.sh packetver24 s20180215 manaplus.log
  artifacts:
    paths:
    - shared
    when: always
    expire_in: 3 week
  allow_failure: true

newlines:
  stage: test
  tags:
  - lightweight
  script:
  - ./.tools/newlines.sh
  artifacts:
    paths:
    - shared
    when: always
    expire_in: 3 week
  #allow_failure: true

licensecheck:
  stage: test
  tags:
  - lightweight
  script:
  - ln -s license.md LICENSE
  - ./.tools/licensecheck.sh
  allow_failure: true

testxml:
  stage: test
  image: ubuntu:18.04
  script:
  - ./.tools/testxml.sh
  - pwd
  allow_failure: true

